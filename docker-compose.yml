version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: time_manager_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: time_manager
      MYSQL_USER: tm_user
      MYSQL_PASSWORD: tm_password
    ports:
      - "3306:3306"
    volumes:
      - tm_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tm_user", "-ptm_password"]
      interval: 5s
      timeout: 3s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: time_manager_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: tm_user
      PMA_PASSWORD: tm_password
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  tm_mysql_data:
